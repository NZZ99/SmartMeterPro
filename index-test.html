<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>သတိပေးချက် - ပြုပြင်နေဆဲ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body {
            font-family: 'Pyidaungsu', sans-serif;
            background-color: #fef2f2;
        }
        .error-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border-t-8 border-red-600 p-8 text-center error-shake">
        <!-- Error Icon -->
        <div class="mb-6 flex justify-center">
            <div class="bg-red-100 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
        </div>

        <!-- Main Content -->
        <h1 class="text-2xl font-black text-gray-900 mb-2">
            ဝင်ရောက်ခွင့်မရှိသေးပါ
        </h1>
        
        <div class="bg-red-50 border-l-4 border-red-500 p-4 my-6">
            <p class="text-xl font-bold text-red-700">
                ပြုပြင်နေဆဲ မကစားရ
            </p>
        </div>

        <p class="text-gray-600 text-sm leading-relaxed mb-8">
            စနစ်ကို အဆင့်မြှင့်တင်နေသောကြောင့် လက်ရှိတွင် အသုံးပြု၍မရနိင်သေးပါ။
        </p>

        <!-- Loading Spinner (Static version for error feel) -->
        <div class="flex items-center justify-center space-x-2 text-gray-400">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
            <span class="text-xs font-semibold uppercase tracking-widest">Maintenance In Progress</span>
        </div>
    </div>

</body>
</html>
